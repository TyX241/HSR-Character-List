<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-detail">
    <div class="main-wrapper">
        
        <div class="row g-0 detail-container">
            <div class="col-md-6 detail-left" id="bg-diagonal">
                 <div class="custom-header ">
                    <h2>Character</h2>
                </div>
                <div class="character-link-style">
                    <a href="index.html" class="character-link"> Characters
                    </a> >
                    <span id="b-name">Name</span>
                </div>
                <img id="char-img" src="" class="main-img" alt="">
            </div>

        <div class="col-md-6 detail-right">
            <h1 id="char-name" class="display-3 fw-bold mb-0">Name</h1>
            <h4 class="text-muted mb-4">VA: <span id="char-va">---</span></h4>

            <p id="char-quote" class="fs-4 fw-bold italic mb-4" style="color: var(--char-color);"></p>

            <div class="detail-divider"></div>

            <div class="stats-box mb-4">
                <div class="stat-row">
                    <div class="stat-label badge-color">Path</div>
                    <div id="char-path">---</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label badge-color">Type</div>
                    <div id="char-type">---</div>
                </div>
                <div class="stat-row">
                    <div class="stat-label badge-color">Faction</div>
                    <div id="char-faction">---</div>
                </div>
            </div>

            <div class="detail-divider"></div>

            <p id="char-desc" class="text-secondary fs-6 mb-4" style="text-align: justify;"></p>

            <div class="preview-box">
                <div class="ratio ratio-16x9 shadow-lg" style="border-radius: 15px; overflow: hidden;">
                    <iframe 
                        id="char-trailer"
                        src=""
                        title="Honkai: Star Rail Trailer" 
                        allowfullscreen>
                    </iframe>
                </div>
            </div>

            <div id="back-button" class="custom-back-button">
                <a href="index.html" class="btn-return shadow-sm"> Return to Characters</a>
            </div>
        </div>
        </div>
    </div>

    <script src="data.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const charId = params.get('id');

        const char = characters.find(item => item.id === charId);

        if (char) {
            document.getElementById('b-name').innerText = char.name;
            document.getElementById('char-name').innerText = char.name;
            document.getElementById('char-va').innerText = char.va || "Unknown";
            document.getElementById('char-quote').innerText = char.quote || "";
            document.getElementById('char-path').innerText = char.path || "-";
            document.getElementById('char-type').innerText = char.type || "-";
            document.getElementById('char-faction').innerText = char.faction || "-";
            document.getElementById('char-desc').innerText = char.description || "";
            if (char.trailer) {
            document.getElementById('char-trailer').src = char.trailer;
            }
            document.getElementById('char-img').src = char.imageFull || char.image;

            document.getElementById('bg-diagonal').style.background = 
                `linear-gradient(135deg, #fff 50%, ${char.color} 50%)`;
            
            document.querySelectorAll('.badge-color').forEach(el => {
                el.style.backgroundColor = char.color;
            });
            document.querySelector('.custom-header').style.backgroundColor = char.color;
            document.getElementById('char-quote').style.color = char.color;
            document.querySelector('.btn-return').style.backgroundColor = char.color;
            document.querySelector('.preview-box').style.borderColor = char.color;
        } else {
            console.error("Karakter tidak ditemukan!");
            window.location.href = "index.html";
        }
        const updateBackground = () => {
            if (window.innerWidth < 768) {
                document.getElementById('bg-diagonal').style.background = 
                    `linear-gradient(180deg, #ffffff 40%, ${char.color} 100%)`;
            } else {
                document.getElementById('bg-diagonal').style.background = 
                    `linear-gradient(135deg, #ffffff 50%, ${char.color} 50%)`;
            }
        };

        updateBackground();

        window.addEventListener('resize', updateBackground);
            </script>
</body>
</html>
